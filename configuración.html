<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONFIG - TRØPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-image: radial-gradient(circle at center, #1a0000 0%, #000 70%); }
        
        .header { padding: 40px 20px 20px; text-align: center; color: #ff0000; text-shadow: 0 0 10px #ff0000; font-size: 1.2rem; }

        .settings-container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; margin-bottom: 90px; }

        .setting-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 0, 0.2); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .setting-info h3 { font-size: 12px; color: #fff; }
        .setting-info p { font-size: 8px; color: #666; text-transform: uppercase; margin-top: 4px; }

        /* Switch Estilo Pro */
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        input:checked + .slider:before { transform: translateX(21px); }

        /* NAVBAR FLOTANTE ESTILO MODIFAX */
        .navbar { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 5px; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 8px; font-weight: bold; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; height: 20px; filter: grayscale(1) brightness(0.6); }
        .nav-item.active .nav-icon { filter: grayscale(0) brightness(1); }
    </style>
</head>
<body>

    <div class="header">ENGINE SETTINGS</div>

    <div class="settings-container">
        <div class="setting-card">
            <div class="setting-info">
                <h3>SUPRESOR V3</h3>
                <p>Estabiliza la mira al disparar</p>
            </div>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>

        <div class="setting-card">
            <div class="setting-info">
                <h3>BOOST FPS</h3>
                <p>Optimiza el rendimiento visual</p>
            </div>
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>

        <div class="setting-card">
            <div class="setting-info">
                <h3>HEADSHOT AIM</h3>
                <p>Calibración de píxeles críticos</p>
            </div>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" class="nav-icon">Inicio</a>
        <a href="ia.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" class="nav-icon">IA</a>
        <a href="chat.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/5948/5948565.png" class="nav-icon">Chat</a>
        <a href="perfil.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="nav-icon">Perfil</a>
        <a href="config.html" class="nav-item active"><img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" class="nav-icon">Config</a>
        <a href="info.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/471/471663.png" class="nav-icon">Info</a>
    </nav>

</body>
</html>
