<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TROPEX</title>
    <style>
        /* FUERZA EL FONDO ROJO OSCURO DESDE EL INICIO */
        html, body {
            background: #1a0000 !important;
            background-color: #1a0000 !important;
            color: white;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 2;
        }

        h1 { font-size: 40px; color: #ff0000; text-shadow: 0 0 15px #ff0000; margin: 0; }
        p { color: #888; letter-spacing: 2px; font-size: 12px; margin-bottom: 30px; }

        .selector { display: flex; gap: 20px; margin-bottom: 30px; }
        .option {
            width: 70px; height: 70px; border: 2px solid #333;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; background: rgba(0,0,0,0.5);
        }
        .option.active { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .option img { width: 40px; }

        input {
            background: #000; border: 1px solid #ff0000;
            padding: 15px; border-radius: 10px; color: white;
            width: 80%; max-width: 300px; text-align: center; margin-bottom: 20px;
        }

        .btn-start {
            background: #ff0000; color: white; border: none;
            padding: 15px 40px; font-weight: bold; border-radius: 5px;
        }

        /* NAVBAR FIJA */
        .navbar {
            height: 70px; background: #000; border-top: 2px solid #ff0000;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>

    <div class="container">
        <h1>TROPEX</h1>
        <p>ELITE SENSITIVITY</p>

        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png">
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
            </div>
        </div>

        <input type="text" id="model" placeholder="MODELO DEL MÓVIL">
        <button class="btn-start" onclick="alert('Generando...')">CONTINUAR</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item active"><div>🏠</div>INICIO</a>
        <a href="chat.html" class="nav-item"><div>🤖</div>IA CHAT</a>
        <a href="pros.html" class="nav-item"><div>🏆</div>PROS</a>
        <a href="config.html" class="nav-item"><div>⚙️</div>AJUSTES</a>
    </nav>

    <script>
        function selectType(type) {
            document.getElementById('opt-android').classList.remove('active');
            document.getElementById('opt-ios').classList.remove('active');
            document.getElementById('opt-' + type.toLowerCase()).classList.add('active');
        }
    </script>
</body>
</html>
