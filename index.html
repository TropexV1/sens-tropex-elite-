<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TRØPEX - ELITE 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            /* Degradado de fondo para que la imagen resalte */
            background-image: radial-gradient(circle at center, #2a0000 0%, #000 80%);
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* CONTENEDOR REFORZADO */
        #character-container {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2; /* Por encima del fondo negro */
            pointer-events: none;
        }

        #personaje {
            height: 75vh; /* Ajuste para que se vea bien en móvil */
            width: auto;
            opacity: 0.8; /* Aumentamos la opacidad para que se vea mejor */
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.7));
            display: block;
        }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            z-index: 10; 
            position: relative; 
            background: rgba(0, 0, 0, 0.2); /* Sutil capa para leer mejor el texto */
        }
        
        h1 { font-size: 2.5rem; color: #ff0000; text-shadow: 0 0 15px #ff0000; font-weight: 900; }
        .subtitle { font-size: 0.6rem; letter-spacing: 4px; color: #aaa; margin-bottom: 30px; text-transform: uppercase; }

        .selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .option { 
            width: 70px; height: 70px; 
            border: 2px solid #333; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
        }
        .option.active { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }

        input { 
            background: rgba(20, 0, 0, 0.9); border: 1px solid #ff0000; 
            padding: 16px; border-radius: 10px; color: white; 
            width: 100%; max-width: 300px; text-align: center; 
            font-family: 'Orbitron'; margin-bottom: 20px; outline: none; 
        }
        
        .btn-start { 
            background: #ff0000; color: white; border: none; 
            padding: 16px 0; font-weight: 900; border-radius: 8px; 
            cursor: pointer; font-family: 'Orbitron'; 
            width: 100%; max-width: 300px; 
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }

        .navbar { 
            background: rgba(0,0,0,0.95); border-top: 2px solid #ff0000; 
            display: flex; justify-content: space-around; 
            padding: 15px 0; width: 100%; position: fixed; 
            bottom: 0; z-index: 100;
        }
        .nav-item { text-align: center; color: #444; text-decoration: none; font-size: 9px; font-weight: bold; flex: 1; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>

    <canvas id="bloodRain"></canvas>

    <div id="character-container">
        <img src="personaje.png" id="personaje" alt="Soldado" onerror="this.src='personajeV3.png'">
    </div>

    <div class="container">
        <h1>TR<span>O</span>PEX</h1>
        <div class="subtitle">CYBERNETIC INTELLIGENCE</div>
        
        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png" width="30">
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" width="30">
            </div>
        </div>

        <input type="text" id="model" placeholder="INTRODUCE MODELO">
        <button class="btn-start" onclick="startProcess()">VINCULAR DISPOSITIVO</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item active">INICIO</a>
        <a href="chat.html" class="nav-item">IA CHAT</a>
        <a href="pros.html" class="nav-item">PROS</a>
        <a href="config.html" class="nav-item">AJUSTES</a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>

    <script>
        // EFECTO TILT PARA MÓVIL
        VanillaTilt.init(document.querySelector("#personaje"), {
            max: 15, speed: 400, scale: 1.05, gyroscope: true
        });

        // Lógica de lluvia
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for (let i = 0; i < 70; i++) drops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, l: Math.random() * 15, v: Math.random() * 4 + 2 });
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(200, 0, 0, 0.4)';
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.l); ctx.stroke();
                d.y += d.v; if (d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        let type = "";
        function selectType(t) {
            type = t;
            document.getElementById('opt-android').style.borderColor = t === 'ANDROID' ? '#ff0000' : '#333';
            document.getElementById('opt-ios').style.borderColor = t === 'IOS' ? '#ff0000' : '#333';
        }

        function startProcess() {
            if(!type || !document.getElementById('model').value) return alert("Completa los datos");
            localStorage.setItem('deviceModel', document.getElementById('model').value);
            window.location.href = "generar.html";
        }
    </script>
</body>
</html>
