<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TRØPEX - Withex ⁴⁴⁴</title>
    <style>
        :root {
            --bg: #010103; --card: rgba(13, 13, 16, 0.95); --blue: #00d4ff;
            --text: #ffffff; --gray: #a0a0a0; --border: #1f1f23; --gold: #ffd700;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
            overflow-x: hidden; min-height: 100vh; position: relative;
        }

        /* LLUVIA AZUL */
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .drop { position: absolute; background: var(--blue); width: 1px; height: 25px; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* NOTIFICACIONES DE PERSONAS */
        #notif-container { position: fixed; top: 20px; width: 90%; max-width: 380px; z-index: 999; pointer-events: none; }
        .notif { 
            background: rgba(10, 10, 15, 0.95); border-left: 4px solid var(--blue); color: white;
            padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px;
            animation: slideIn 0.5s ease-out, fadeOut 0.5s ease-in 4s forwards;
            display: flex; flex-direction: column; border: 1px solid #333;
        }
        .notif b { color: var(--blue); font-size: 11px; text-transform: uppercase; }
        @keyframes slideIn { from { transform: translateX(120%); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }

        .app-container { width: 100%; max-width: 414px; padding: 20px; z-index: 1; padding-bottom: 50px; }
        h2 { text-align: center; letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px var(--blue); margin-bottom: 25px; }

        .box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .label { font-size: 10px; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }
        
        select, input { width: 100%; background: #0a0a0c; border: 1px solid #222; color: #fff; font-size: 15px; outline: none; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }

        .btn-gerar { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; transition: 0.3s; }
        .btn-gerar:active { transform: scale(0.95); background: var(--blue); }

        /* RESULTADOS */
        #results { display: none; }
        .res-card { background: var(--card); border: 1px solid var(--blue); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-top: 5px solid var(--blue); }
        .val-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .highlight { color: var(--gold); font-weight: bold; border: none; }

        /* CHAT GLOBAL */
        .chat-box { background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 18px; padding: 15px; margin-bottom: 30px; }
        #chat-content { height: 100px; overflow-y: auto; font-size: 13px; color: #ddd; margin-bottom: 10px; }
        .chat-msg { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 3px; }
        .chat-msg b { color: var(--blue); }
        .chat-input-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; margin-bottom: 0; padding: 10px; }
        .chat-send { background: var(--blue); border: none; color: #fff; border-radius: 8px; width: 60px; cursor: pointer; font-weight: bold; font-size: 10px; }

        .section-title { font-size: 12px; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .social-btn { text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 15px; font-weight: 900; color: white; background: #25D366; }

        .credits { text-align: center; margin-top: 30px; font-size: 11px; color: var(--gray); font-weight: bold; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="rain-container"></div>
<div id="notif-container"></div>

<div class="app-container">
    <h2>SENS <span style="color:var(--blue)">TRØPEX</span></h2>

    <div id="setup">
        <div class="box">
            <span class="label">⚙️ Dispositivo</span>
            <select id="brand" onchange="updateModels()">
                <option value="apple">Apple</option>
                <option value="samsung">Samsung</option>
                <option value="xiaomi">Xiaomi</option>
                <option value="motorola">Motorola</option>
            </select>
            <select id="model"></select>
        </div>

        <div class="box">
            <span class="label">👤 Perfil</span>
            <input type="text" id="user-name" placeholder="Tu nombre">
            <input type="number" id="user-age" placeholder="Edad">
            <select id="user-goal">
                <option value="head">Solo Capa (Headshots) 🔴</option>
                <option value="mov">Movimientos Insanos ⚡</option>
            </select>
        </div>

        <button class="btn-gerar" onclick="process()">🚀 GENERAR CONFIGURACIÓN</button>
    </div>

    <div id="results">
        <div class="res-card">
            <div id="res-user-info" style="font-size: 11px; color: var(--gold); margin-bottom: 5px; font-weight: bold;"></div>
            <div id="res-name" style="font-weight: 900; color: var(--blue); margin-bottom: 15px; text-transform: uppercase; font-size: 22px;"></div>
            <div class="val-row"><span>General:</span> <b id="v-gen"></b></div>
            <div class="val-row"><span>Mira Roja:</span> <b id="v-red"></b></div>
            <div class="val-row"><span>Mira 2x:</span> <b id="v-2x"></b></div>
            <div class="val-row"><span>Mira 4x:</span> <b id="v-4x"></b></div>
            <div class="val-row highlight"><span>DPI:</span> <span id="dpi-val"></span></div>
            <div class="val-row highlight"><span>Botón:</span> <b id="v-btn"></b></div>
        </div>
        <button class="btn-gerar" style="background:#111; color:#fff;" onclick="location.reload()">🔄 REINTENTAR</button>
    </div>

    <div class="chat-box">
        <div class="label" style="color: var(--blue);">💬 CHAT PÚBLICO</div>
        <div id="chat-content"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Mensaje...">
            <button class="chat-send" onclick="sendMsg()">ENVIAR</button>
        </div>
    </div>

    <a href="https://chat.whatsapp.com/LJ03CJlxd0pLTI2KeRTBrL?mode=gi_t" target="_blank" class="social-btn">
        <span>🟢 ÚNETE AL GRUPO</span>
    </a>

    <div class="credits">Propiedad de Withex ⁴⁴⁴</div>
</div>

<script>
    const db = {
        apple: ["iPhone 16 Pro Max", "iPhone 15 Pro", "iPhone 13", "iPhone 11"],
        samsung: ["Galaxy S24 Ultra", "Galaxy A54", "Galaxy S21 FE"],
        xiaomi: ["Poco F6 Pro", "Redmi Note 13", "Poco X3 Pro"],
        motorola: ["Edge 50 Pro", "Moto G84"]
    };

    function updateModels() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = "";
        db[b].forEach(m => { s.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    // --- FUNCIÓN DE LA VOZ CON RISA ---
    function playWithexVoice(userName) {
        window.speechSynthesis.cancel();
        
        // El texto incluye "jajaja" para intentar que la IA simule la risa
        const text = `Withex cuatro cuatro cuatro. El mejor generador de sensi. jajaja.`;
        const msg = new SpeechSynthesisUtterance(text);
        
        // Buscamos voz femenina
        const voices = window.speechSynthesis.getVoices();
        const female = voices.find(v => v.name.includes('Google') && v.lang.includes('es')) || voices[0];
        
        msg.voice = female;
        msg.pitch = 1.3; // Más agudo
        msg.rate = 0.9;  // Un poco más lento para que se note la risa
        msg.lang = 'es-ES';
        
        window.speechSynthesis.speak(msg);
    }

    function process() {
        const name = document.getElementById('user-name').value || "Soldado";
        const b = document.getElementById('brand').value;
        const m = document.getElementById('model').value;
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        
        document.getElementById('res-user-info').innerText = `USUARIO: ${name} | STATUS: OPTIMIZADO`;
        document.getElementById('res-name').innerText = m;
        
        document.getElementById('v-gen').innerText = r(175, 200);
        document.getElementById('v-red').innerText = r(170, 200);
        document.getElementById('v-2x').innerText = r(180, 200);
        document.getElementById('v-4x').innerText = r(180, 200);
        document.getElementById('v-btn').innerText = r(38, 50) + "%";
        document.getElementById('dpi-val').innerText = (b === 'apple') ? "NATIVO" : r(411, 600);
        
        playWithexVoice(name);
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        const name = document.getElementById('user-name').value || "Invitado";
        if(input.value.trim() === "") return;
        document.getElementById('chat-content').innerHTML += `<div><b>${name}:</b> ${input.value}</div>`;
        input.value = "";
    }

    window.onload = () => {
        updateModels();
        // Generar lluvia
        const c = document.getElementById('rain-container');
        for(let i=0; i<40; i++) {
            const d = document.createElement('div');
            d.classList.add('drop');
            d.style.left = Math.random()*100+'vw';
            d.style.animationDuration = Math.random()*1+0.5+'s';
            c.appendChild(d);
        }
    };
</script>
</body>
</html>
