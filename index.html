<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TROPEX - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050000;
            color: white;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #000;
        }

        /* Canvas para la lluvia de sangre */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10; /* Arriba de la lluvia */
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #aaa;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Selector de Android/iOS */
        .selector {
            display: flex;
            gap: 25px;
            margin-bottom: 35px;
        }

        .option {
            width: 80px;
            height: 80px;
            border: 2px solid #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .option img {
            width: 40px;
            filter: grayscale(1) brightness(0.8);
        }

        .option.active {
            border-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            background: rgba(255, 0, 0, 0.1);
            transform: scale(1.1);
        }

        .option.active img {
            filter: grayscale(0) brightness(1.2);
        }

        /* Input de texto */
        input {
            background: rgba(20, 0, 0, 0.6);
            border: 1px solid #ff0000;
            padding: 18px;
            border-radius: 12px;
            color: white;
            width: 90%;
            max-width: 320px;
            text-align: center;
            font-family: 'Orbitron';
            font-size: 14px;
            margin-bottom: 25px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.2);
        }

        /* Botón de acción */
        .btn-start {
            background: #ff0000;
            color: white;
            border: none;
            padding: 16px 50px;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        /* BARRA DE NAVEGACIÓN INFERIOR */
        .navbar {
            background: #000;
            border-top: 2px solid #ff0000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            width: 100%;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: #555;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
        }

        .nav-item.active {
            color: #ff0000;
        }

        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

    </style>
</head>
<body>

    <canvas id="bloodRain"></canvas>

    <div class="container">
        <h1>TROPEX</h1>
        <div class="subtitle">Elite Sensitivity</div>

        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png" alt="Android">
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="iOS">
            </div>
        </div>

        <input type="text" id="model" placeholder="MODELO DEL MÓVIL" autocomplete="off">
        
        <button class="btn-start" onclick="start()">GENERAR</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item active">
            <div class="icon">🏠</div>INICIO
        </a>
        <a href="chat.html" class="nav-item">
            <div class="icon">🤖</div>IA CHAT
        </a>
        <a href="pros.html" class="nav-item">
            <div class="icon">🏆</div>PROS
        </a>
        <a href="config.html" class="nav-item">
            <div class="icon">⚙️</div>AJUSTES
        </a>
    </nav>

    <script>
        // --- LLUVIA DE SANGRE ---
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const drops = [];
        const numDrops = 150; // Cantidad de gotas

        for (let i = 0; i < numDrops; i++) {
            drops.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                length: Math.random() * 20 + 5, // Largo de la gota
                velocity: Math.random() * 5 + 3, // Velocidad de caída
                opacity: Math.random() * 0.5 + 0.1 // Transparencia
            });
        }

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';

            for (let i = 0; i < numDrops; i++) {
                const drop = drops[i];
                // Color rojo oscuro/sangre
                ctx.strokeStyle = `rgba(139, 0, 0, ${drop.opacity})`; 
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x, drop.y + drop.length);
                ctx.stroke();

                // Actualizar posición
                drop.y += drop.velocity;

                // Reiniciar si sale de la pantalla
                if (drop.y > canvas.height) {
                    drop.y = -drop.length;
                    drop.x = Math.random() * canvas.width;
                }
            }

            requestAnimationFrame(drawRain);
        }

        drawRain();

        // --- LÓGICA DE LA PÁGINA ---
        let selectedType = "";

        function selectType(type) {
            selectedType = type;
            document.getElementById('opt-android').classList.remove('active');
            document.getElementById('opt-ios').classList.remove('active');
            
            if(type === 'ANDROID') {
                document.getElementById('opt-android').classList.add('active');
            } else {
                document.getElementById('opt-ios').classList.add('active');
            }
        }

        function start() {
            const modelName = document.getElementById('model').value;
            if(!selectedType) {
                alert("Selecciona ANDROID o IOS");
                return;
            }
            if(!modelName) {
                alert("Escribe el modelo de tu móvil");
                return;
            }
            
            // Guardamos los datos para usarlos en la siguiente página
            localStorage.setItem('userDevice', selectedType + " " + modelName);
            // Aquí puedes redirigir a generar.html (debes crear ese archivo después)
            // window.location.href = "generar.html"; 
            alert("Generando sensibilidad elite para " + modelName + " (" + selectedType + ")...");
        }

        // Ajustar canvas al redimensionar la ventana
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
