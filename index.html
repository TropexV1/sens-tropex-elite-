<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENERANDO - TRØPEX AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 70%);
        }

        /* Scanner de CPU */
        .scanner-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .cpu-icon {
            width: 100px;
            filter: drop-shadow(0 0 15px #ff0000);
            z-index: 5;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            top: 0;
            animation: scan 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Texto de Carga */
        .loading-text {
            text-align: center;
            max-width: 80%;
        }

        #status {
            color: #ff0000;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            height: 20px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            transition: width 0.3s;
        }

        .logs {
            margin-top: 20px;
            font-size: 9px;
            color: #444;
            font-family: monospace;
            height: 50px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="scanner-container">
        <div class="orbit"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" class="cpu-icon">
        <div class="scan-line"></div>
    </div>

    <div class="loading-text">
        <div id="status">INICIANDO NÚCLEO...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
        <div class="logs" id="logs"></div>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const fill = document.getElementById('fill');
        const logs = document.getElementById('logs');

        const steps = [
            { text: "Detectando Hardware...", time: 0, log: "> CPU: ARMv8-A detected" },
            { text: "Analizando DPI...", time: 20, log: "> DPI Sensor: Calibrating..." },
            { text: "Sincronizando Sens...", time: 40, log: "> Engine: Adjusting X/Y axis" },
            { text: "Inyectando Código...", time: 60, log: "> Bypass: Elite status active" },
            { text: "Finalizando...", time: 80, log: "> Cloud: Config saved" },
            { text: "¡COMPLETADO!", time: 100, log: "> Success: Redirecting..." }
        ];

        let currentStep = 0;

        function updateProgress() {
            if (currentStep < steps.length) {
                const step = steps[currentStep];
                statusText.innerText = step.text;
                fill.style.width = step.time + "%";
                
                const newLog = document.createElement('div');
                newLog.innerText = step.log;
                logs.prepend(newLog);

                currentStep++;
                setTimeout(updateProgress, 800);
            } else {
                // Redirigir a la página final
                setTimeout(() => {
                    window.location.href = "final.html";
                }, 500);
            }
        }

        // Recuperar el modelo guardado para darle realismo
        const model = localStorage.getItem('deviceModel') || "Device";
        console.log("Optimizando para: " + model);

        setTimeout(updateProgress, 500);
    </script>
</body>
</html>
