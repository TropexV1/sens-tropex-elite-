<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TRØPEX - Withex ⁴⁴⁴</title>
    <style>
        :root {
            --bg: #010103; --card: rgba(13, 13, 16, 0.95); --blue: #00d4ff;
            --text: #ffffff; --gray: #a0a0a0; --border: #1f1f23; --gold: #ffd700;
            --msg-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
            overflow-x: hidden; min-height: 100vh; position: relative;
        }

        /* LLUVIA AZUL */
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .drop { position: absolute; background: var(--blue); width: 1px; height: 25px; opacity: 0.3; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* NOTIFICACIONES */
        #notif-container { position: fixed; top: 20px; width: 90%; max-width: 380px; z-index: 999; pointer-events: none; }
        .notif { 
            background: rgba(10, 10, 15, 0.95); border-left: 4px solid var(--blue); color: white;
            padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px;
            animation: slideIn 0.5s ease-out, fadeOut 0.5s ease-in 4s forwards;
            display: flex; flex-direction: column; border: 1px solid #333;
        }
        .notif b { color: var(--blue); font-size: 11px; text-transform: uppercase; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }

        .app-container { width: 100%; max-width: 414px; padding: 20px; z-index: 1; padding-bottom: 50px; }
        h2 { text-align: center; letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px var(--blue); margin-bottom: 25px; }

        .box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .label { font-size: 10px; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }
        
        select, input { width: 100%; background: #0a0a0c; border: 1px solid #222; color: #fff; font-size: 15px; outline: none; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }

        .btn-gerar { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; transition: 0.3s; }
        .btn-gerar:active { transform: scale(0.98); background: var(--blue); }

        #results { display: none; }
        .res-card { background: var(--card); border: 1px solid var(--blue); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-top: 4px solid var(--blue); }
        .val-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; }
        .highlight { color: var(--gold); font-weight: bold; border: none; }

        /* CHAT GLOBAL COLORIDO */
        .chat-box { background: rgba(0,0,0,0.95); border: 1px solid #333; border-radius: 20px; padding: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #chat-content { height: 220px; overflow-y: auto; font-size: 13px; color: #ddd; margin-bottom: 15px; padding-right: 5px; }
        .chat-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; background: var(--msg-bg); border-left: 3px solid var(--blue); line-height: 1.4; }
        .chat-msg b { font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .chat-input-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; margin-bottom: 0; padding: 12px; background: #0a0a0c; border: 1px solid #333; }
        .chat-send { background: var(--blue); border: none; color: #000; border-radius: 10px; width: 80px; cursor: pointer; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        /* PRO PLAYERS */
        .section-title { font-size: 13px; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .pro-card { background: #0a0a0c; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pro-name { color: var(--blue); font-weight: 900; font-size: 15px; grid-column: span 2; border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .pro-stat { font-size: 11px; color: #aaa; }
        .pro-stat b { color: #fff; }

        .social-btn { text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 15px; font-weight: 900; color: white; background: #25D366; }
        .credits { text-align: center; margin-top: 30px; font-size: 11px; color: var(--gray); font-weight: bold; padding-bottom: 30px; }
    </style>
</head>
<body>

<div id="rain-container"></div>
<div id="notif-container"></div>

<div class="app-container">
    <h2>SENS <span style="color:var(--blue)">TRØPEX</span></h2>

    <div id="setup">
        <div class="box">
            <span class="label">🎯 Especialización</span>
            <select id="user-goal">
                <option value="red">Dar solo Rojo 🔴</option>
                <option value="mov">Movimientos Insanos ⚡</option>
                <option value="stab">Cero Temblores 🛠️</option>
            </select>
        </div>

        <div class="box">
            <span class="label">📱 Dispositivo</span>
            <select id="brand" onchange="updateModels()">
                <option value="apple">Apple (iPhone/iPad)</option>
                <option value="samsung">Samsung</option>
                <option value="xiaomi">Xiaomi / Poco</option>
                <option value="motorola">Motorola</option>
                <option value="huawei">Huawei</option>
                <option value="infinix">Infinix</option>
                <option value="tecno">Tecno</option>
                <option value="zte">ZTE / RedMagic</option>
            </select>
            <select id="model"></select>
        </div>
        <button class="btn-gerar" onclick="process()">🚀 GENERAR CONFIGURACIÓN</button>
    </div>

    <div id="results">
        <div class="res-card">
            <div id="res-header" style="font-size: 10px; color: var(--gold); margin-bottom: 8px; font-weight: bold; text-transform: uppercase;"></div>
            <div id="res-name" style="font-weight: 900; color: var(--blue); margin-bottom: 15px; font-size: 22px;"></div>
            <div class="val-row"><span>Geral:</span> <b id="v-gen"></b></div>
            <div class="val-row"><span>Mira Roja:</span> <b id="v-red"></b></div>
            <div class="val-row"><span>Mira 2x:</span> <b id="v-2x"></b></div>
            <div class="val-row"><span>Mira 4x:</span> <b id="v-4x"></b></div>
            <div class="val-row highlight"><span>DPI:</span> <span id="dpi-val"></span></div>
            <div class="val-row highlight"><span>Botón:</span> <b id="v-btn"></b></div>
        </div>
        <button class="btn-gerar" style="background:#111; color:#fff;" onclick="location.reload()">🔄 NUEVO ANÁLISIS</button>
    </div>

    <div class="chat-box">
        <div class="label" style="color: var(--blue); font-weight: 900; margin-bottom: 12px; letter-spacing: 1px;">🌎 CHAT DE LA COMUNIDAD</div>
        <div id="chat-content"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Escribe tu mensaje aquí...">
            <button class="chat-send" onclick="sendMsg()">ENVIAR</button>
        </div>
    </div>

    <div class="section-title">🏆 PRO PLAYERS PANEL</div>
    <div id="pro-list">
        <div class="pro-card" style="border: 1px solid var(--gold); background: rgba(255, 215, 0, 0.02);">
            <span class="pro-name">WITHeX ⁴⁴⁴ 👑</span>
            <span class="pro-stat">Geral: <b>200</b></span><span class="pro-stat">Botão: <b>38%</b></span>
            <span class="pro-stat">DPI: <b>NATIVO</b></span><span class="pro-stat">Mira 2x: <b>198</b></span>
        </div>
        <div class="pro-card"><span class="pro-name">WHITE 444</span><span class="pro-stat">Geral: 100</span><span class="pro-stat">Botão: 42%</span></div>
        <div class="pro-card"><span class="pro-name">NOBRU TV</span><span class="pro-stat">Geral: 91</span><span class="pro-stat">Botão: 45%</span></div>
    </div>

    <a href="https://chat.whatsapp.com/LJ03CJlxd0pLTI2KeRTBrL" target="_blank" class="social-btn">🟢 GRUPO DE WHATSAPP</a>
    <div class="credits">Propiedad de Withex ⁴⁴⁴</div>
</div>

<script>
    const db = {
        apple: ["iPhone 16 Pro Max", "iPhone 15 Pro", "iPhone 13", "iPhone 11", "iPhone 8 Plus", "iPad Pro"],
        samsung: ["Galaxy S24 Ultra", "Galaxy S23 FE", "Galaxy A54", "Galaxy A34", "Galaxy A10s"],
        xiaomi: ["Poco F6 Pro", "Poco X6 Pro", "Redmi Note 13 Pro", "Xiaomi 14 Ultra"],
        motorola: ["Edge 50 Pro", "Moto G84", "Moto G54"],
        huawei: ["P60 Pro", "Mate 50 Pro"],
        infinix: ["Note 40 Pro", "Hot 40 Pro"],
        tecno: ["Pova 6 Pro", "Spark 20 Pro"],
        zte: ["Nubia RedMagic 9 Pro", "Axon 50"]
    };

    const colors = ["#00d4ff", "#ffd700", "#ff007f", "#00ff88", "#ff8800", "#ffffff"];

    function updateModels() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = "";
        db[b].forEach(m => { s.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        if(input.value.trim() === "") return;
        
        let msgs = JSON.parse(localStorage.getItem('globalChat') || "[]");
        const color = colors[Math.floor(Math.random() * colors.length)];
        msgs.push({ name: "JUGADOR", text: input.value, color: color });
        
        if(msgs.length > 25) msgs.shift();
        localStorage.setItem('globalChat', JSON.stringify(msgs));
        renderChat();
        input.value = "";
    }

    function renderChat() {
        const chat = document.getElementById('chat-content');
        const msgs = JSON.parse(localStorage.getItem('globalChat') || "[]");
        chat.innerHTML = msgs.map(m => `
            <div class="chat-msg">
                <b style="color: ${m.color}">${m.name}</b>
                <span>${m.text}</span>
            </div>
        `).join('');
        chat.scrollTop = chat.scrollHeight;
    }

    function process() {
        const goal = document.getElementById('user-goal').options[document.getElementById('user-goal').selectedIndex].text;
        const b = document.getElementById('brand').value;
        const m = document.getElementById('model').value;
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
        
        alert("¡Configuración inyectada con éxito!");
        document.getElementById('setup').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        
        document.getElementById('res-header').innerText = `MODO: ${goal}`;
        document.getElementById('res-name').innerText = m;
        document.getElementById('v-gen').innerText = r(96, 100);
        document.getElementById('v-red').innerText = r(94, 100);
        document.getElementById('v-2x').innerText = r(92, 100);
        document.getElementById('v-4x').innerText = r(92, 100);
        document.getElementById('v-btn').innerText = r(38, 52) + "%";
        
        document.getElementById('dpi-val').innerText = (b === 'apple') ? "NATIVO" : r(411, 850);
    }

    window.onload = () => {
        updateModels();
        renderChat();
        const c = document.getElementById('rain-container');
        for(let i=0; i<40; i++) {
            const d = document.createElement('div');
            d.classList.add('drop');
            d.style.left = Math.random()*100+'vw';
            d.style.animationDuration = Math.random()*1+0.5+'s';
            c.appendChild(d);
        }
        // Mensajes simulados iniciales si está vacío
        if(!localStorage.getItem('globalChat')){
            localStorage.setItem('globalChat', JSON.stringify([
                {name: "SANTI_FF", text: "Withex, esta sensi es otro nivel 👑", color: "#00ff88"},
                {name: "PEDRO_PRO", text: "Por fin pego rojos en iPhone!", color: "#ff007f"}
            ]));
            renderChat();
        }
    };
</script>
</body>
</html>
