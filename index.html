<script>
    function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        if(!input.value) return;

        container.innerHTML += `<div class="msg user">${input.value}</div>`;
        const text = input.value.toLowerCase();
        input.value = "";
        
        setTimeout(() => {
            let reply = "Como IA de TROPEX, te sugiero usar nuestro generador principal para obtener tu configuración exacta. ¿Qué dispositivo usas?";

            // --- RESPUESTAS POR ARMAS ---
            if(text.includes("m1014") || text.includes("escopeta")) {
                reply = "Para la M1014, usa un botón de disparo de 55%. El truco es un movimiento de 'J' rápida y corta desde cerca. 🔴";
            }
            else if(text.includes("desert") || text.includes("eagle") || text.includes("pistola")) {
                reply = "Con la Desert Eagle, la clave es la paciencia. Espera a que el enemigo salte y levanta la mira suavemente hacia arriba. Botón ideal: 42%.";
            }
            else if(text.includes("mp40") || text.includes("smg") || text.includes("umid")) {
                reply = "Para SMG como la MP40, mantén la sensibilidad general al 100%. Levanta la mira recto y constante. ¡No sueltes el botón!";
            }
            // --- RESPUESTAS GENERALES ---
            else if(text.includes("hola") || text.includes("buenas")) {
                reply = "¡Hola! Soy la IA de SENS TROPEX. Pregúntame por un arma o un dispositivo. 🤖";
            }
            else if(text.includes("iphone") || text.includes("ios")) {
                reply = "En iOS usa el cursor deslizante en 120 (Individual). Sensibilidad general al 97%.";
            }
            else if(text.includes("android") || text.includes("samsung") || text.includes("xiaomi")) {
                reply = "En Android, activa la 'Supresión' y sube el DPI entre 550 y 600 para mayor fluidez.";
            }
            else if(text.includes("dpi")) {
                reply = "El DPI depende de tu pantalla, pero en SENS TROPEX recomendamos no pasar de 600 en Android para no perder el 'aimlock'.";
            }
            else if(text.includes("rojo")) {
                reply = "Para pegar todo rojo, asegúrate de que el círculo de la mira esté blanco antes de disparar y súbelo rápido a la cabeza.";
            }

            container.innerHTML += `<div class="msg ai">${reply}</div>`;
            container.scrollTop = container.scrollHeight;
        }, 600);
    }
</script>
