<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TROPEX - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Lluvia de Sangre */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; position: relative; }
        
        h1 { font-size: 2.8rem; color: #ff0000; text-shadow: 0 0 20px #ff0000; font-weight: 900; }
        .subtitle { font-size: 0.7rem; letter-spacing: 5px; color: #aaa; margin-bottom: 40px; text-transform: uppercase; }

        .selector { display: flex; gap: 25px; margin-bottom: 35px; }
        .option { width: 80px; height: 80px; border: 2px solid #333; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.6); }
        .option img { width: 40px; filter: grayscale(1); }
        .option.active { border-color: #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); background: rgba(255, 0, 0, 0.1); transform: scale(1.1); }
        .option.active img { filter: grayscale(0); }

        input { background: rgba(20, 0, 0, 0.8); border: 1px solid #ff0000; padding: 18px; border-radius: 12px; color: white; width: 90%; max-width: 320px; text-align: center; font-family: 'Orbitron'; margin-bottom: 25px; outline: none; }
        
        .btn-start { background: #ff0000; color: white; border: none; padding: 16px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }

        /* NAVBAR QUE TE FALTABA */
        .navbar { background: #000; border-top: 2px solid #ff0000; display: flex; justify-content: space-around; padding: 15px 0; width: 100%; z-index: 100; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #ff0000; }
        .nav-item .icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <canvas id="bloodRain"></canvas>

    <div class="container">
        <h1>TROPEX</h1>
        <div class="subtitle">Elite Sensitivity</div>

        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png">
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
            </div>
        </div>

        <input type="text" id="model" placeholder="MODELO DEL MÓVIL">
        <button class="btn-start" onclick="startProcess()">CONTINUAR</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item active"><div class="icon">🏠</div>INICIO</a>
        <a href="chat.html" class="nav-item"><div class="icon">🤖</div>IA CHAT</a>
        <a href="pros.html" class="nav-item"><div class="icon">🏆</div>PROS</a>
        <a href="config.html" class="nav-item"><div class="icon">⚙️</div>AJUSTES</a>
    </nav>

    <script>
        // --- LLUVIA DE SANGRE ---
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for (let i = 0; i < 100; i++) {
            drops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, l: Math.random() * 25, v: Math.random() * 5 + 4 });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(150, 0, 0, 0.7)'; ctx.lineWidth = 2;
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.l); ctx.stroke();
                d.y += d.v; if (d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // --- LÓGICA ---
        let type = "";
        function selectType(t) {
            type = t;
            document.getElementById('opt-android').classList.remove('active');
            document.getElementById('opt-ios').classList.remove('active');
            document.getElementById('opt-' + t.toLowerCase()).classList.add('active');
        }

        function startProcess() {
            const m = document.getElementById('model').value;
            if(!type || !m) return alert("Completa los datos");
            
            // En lugar de "Generando...", cambiamos el texto del botón
            const btn = document.querySelector('.btn-start');
            btn.innerHTML = "EXTRAYENDO DATOS...";
            btn.style.background = "#550000";
            
            setTimeout(() => {
                alert("Sincronización con " + m + " completada. Revisa la IA para tu configuración.");
            }, 2000);
        }
    </script>
</body>
</html>
