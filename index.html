<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TRØPEX - ELITE 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 70%);
        }
        
        /* Lluvia de Sangre */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* PERSONAJE DE FONDO CON MOVIMIENTO */
        #character-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        #personaje {
            height: 75vh;
            opacity: 0.6;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            transform-style: preserve-3d;
        }

        /* Contenido Principal */
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            z-index: 10; 
            position: relative; 
            margin-bottom: 100px; 
        }
        
        h1 { font-size: 2.5rem; color: #ff0000; text-shadow: 0 0 15px #ff0000; font-weight: 900; }
        .subtitle { font-size: 0.6rem; letter-spacing: 4px; color: #aaa; margin-bottom: 30px; text-transform: uppercase; }

        /* Selector de Sistema Estilo Modifax */
        .selector { display: flex; gap: 15px; margin-bottom: 25px; width: 100%; max-width: 320px; }
        .option { 
            flex: 1; height: 100px; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); transition: 0.3s;
            color: #666; font-size: 10px; font-weight: bold; gap: 8px;
        }
        .option img { width: 30px; filter: grayscale(1) brightness(0.5); }
        .option.active { border-color: #ff0000; background: rgba(255,0,0,0.1); color: #fff; }
        .option.active img { filter: grayscale(0) brightness(1); }

        input { 
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,0,0,0.3); 
            padding: 16px; border-radius: 12px; color: white; 
            width: 100%; max-width: 320px; text-align: center; 
            font-family: 'Orbitron'; margin-bottom: 20px; outline: none; 
            font-size: 13px;
        }
        
        .btn-start { 
            background: #ff0000; color: white; border: none; 
            padding: 16px 0; font-weight: 900; border-radius: 50px; 
            cursor: pointer; font-family: 'Orbitron'; 
            width: 100%; max-width: 320px; 
            box-shadow: 0 5px 20px rgba(255,0,0,0.4); text-transform: uppercase;
        }

        /* NAVBAR FLOTANTE ESTILO MODIFAX */
        .navbar { 
            position: fixed; bottom: 20px; left: 5%; width: 90%; 
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; 
            display: flex; justify-content: space-around; padding: 12px 5px; z-index: 1000; 
        }
        .nav-item { 
            text-align: center; color: #555; text-decoration: none; 
            font-size: 8px; font-weight: bold; flex: 1;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; height: 20px; filter: grayscale(1) brightness(0.6); }
        .nav-item.active .nav-icon { filter: grayscale(0) brightness(1); }
    </style>
</head>
<body>

    <canvas id="bloodRain"></canvas>

    <div id="character-container">
        <img src="personaje.png" id="personaje" alt="Tropex Soldier">
    </div>

    <div class="container">
        <h1>TR<span>Ø</span>PEX</h1>
        <div class="subtitle">Cybernetic Intelligence</div>
        
        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png">
                ANDROID
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
                IOS
            </div>
        </div>

        <input type="text" id="model" placeholder="Ej: Galaxy S23, iPhone 15...">
        <button class="btn-start" onclick="startProcess()">Continuar ></button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item active">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" class="nav-icon">
            Inicio
        </a>
        <a href="ia.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" class="nav-icon">
            IA
        </a>
        <a href="chat.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/5948/5948565.png" class="nav-icon">
            Chat
        </a>
        <a href="perfil.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="nav-icon">
            Perfil
        </a>
        <a href="config.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" class="nav-icon">
            Config
        </a>
        <a href="info.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/471/471663.png" class="nav-icon">
            Info
        </a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>

    <script>
        // Efecto Movimiento Personaje
        VanillaTilt.init(document.querySelector("#personaje"), {
            max: 15, speed: 300, scale: 1.05, gyroscope: true
        });

        // Lluvia
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for (let i = 0; i < 70; i++) drops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, l: Math.random() * 15, v: Math.random() * 4 + 2 });
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(200, 0, 0, 0.4)';
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.l); ctx.stroke();
                d.y += d.v; if (d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        let type = "";
        function selectType(t) {
            type = t;
            document.getElementById('opt-android').classList.remove('active');
            document.getElementById('opt-ios').classList.remove('active');
            document.getElementById('opt-' + t.toLowerCase()).classList.add('active');
        }

        function startProcess() {
            const m = document.getElementById('model').value;
            if(!type || !m) return alert("Selecciona equipo y modelo");
            localStorage.setItem('deviceModel', m);
            window.location.href = "generar.html";
        }
    </script>
</body>
</html>
