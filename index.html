<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRØPEX - ELITE ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }

        /* --- PANTALLA DE CARGA (PRELOADER) --- */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }

        /* Átomo / Núcleo Animado */
        .loader-core {
            width: 80px; height: 80px;
            border: 3px solid transparent;
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .loader-core::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px solid transparent;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-title { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #ff0000; margin-bottom: 5px; }
        .loading-subtitle { font-size: 0.7rem; color: #ff0000; letter-spacing: 5px; margin-bottom: 40px; }

        /* Barra de carga mejorada */
        .progress-box { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 15px #ff0000; transition: width 0.1s; }
        .percent { margin-top: 10px; font-size: 12px; color: #aaa; }

        /* --- INTERFAZ PRINCIPAL (Oculta al inicio) --- */
        #main-content { opacity: 0; transition: opacity 1s ease; }
        
        /* (Estilos de tu index previo aquí) */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1 { font-size: 3rem; text-shadow: 0 0 20px #ff0000; color: #ff0000; }
        .btn-start { background: #ff0000; border: none; padding: 15px 40px; color: white; font-family: 'Orbitron'; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-core"></div>
        <div class="loading-title">TRØPEX</div>
        <div class="loading-subtitle">SENSITIVITY ENGINE</div>
        <div class="progress-box">
            <div class="progress-bar" id="bar"></div>
        </div>
        <div class="percent" id="percent">0%</div>
    </div>

    <div id="main-content">
        <canvas id="bloodRain"></canvas>
        <div class="container">
            <h1>TRØPEX</h1>
            <p style="margin-bottom: 40px; color: #666; letter-spacing: 3px;">ELITE SYSTEM READY</p>
            <button class="btn-start" onclick="location.href='generar.html'">INICIAR ESCANEO ></button>
        </div>
    </div>

    <script>
        // Lógica del Preloader
        let progress = 0;
        const bar = document.getElementById('bar');
        const percent = document.getElementById('percent');
        const preloader = document.getElementById('preloader');
        const mainContent = document.getElementById('main-content');

        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 1;
            if (progress > 100) progress = 100;
            
            bar.style.width = progress + "%";
            percent.innerText = progress + "%";

            if (progress === 100) {
                clearInterval(interval);
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => {
                        preloader.style.display = 'none';
                        mainContent.style.opacity = '1';
                    }, 800);
                }, 500);
            }
        }, 80);

        // Lluvia de fondo
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for (let i = 0; i < 50; i++) drops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, v: Math.random() * 5 + 2 });
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + 10); ctx.stroke();
                d.y += d.v; if (d.y > canvas.height) d.y = -10;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
