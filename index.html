<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TRØPEX - Withex ⁴⁴⁴</title>
    <style>
        :root {
            --bg: #010103; --card: rgba(13, 13, 16, 0.95); --blue: #00d4ff;
            --text: #ffffff; --gray: #a0a0a0; --border: #1f1f23; --gold: #ffd700;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
            overflow-x: hidden; min-height: 100vh; position: relative;
        }

        /* LLUVIA DE SANGRE AZUL */
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .drop { position: absolute; background: var(--blue); width: 1px; height: 20px; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        .app-container { width: 100%; max-width: 414px; padding: 20px; z-index: 1; padding-bottom: 50px; }
        h2 { text-align: center; letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px var(--blue); }

        /* SELECTORES */
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .label { font-size: 10px; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; display: block; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; cursor: pointer; }
        option { background: #000; color: #fff; }

        .btn-gerar { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* IA CHAT ESTILO WITHeX */
        .ai-box { background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 18px; padding: 15px; border-left: 4px solid var(--blue); margin-bottom: 30px; }
        #ai-chat { height: 90px; overflow-y: auto; font-size: 13px; color: #ddd; line-height: 1.5; margin-bottom: 10px; }
        .ai-input-row { display: flex; gap: 8px; }
        #ai-input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        .ai-send { background: var(--blue); border: none; color: #fff; border-radius: 8px; width: 40px; cursor: pointer; font-weight: bold; }

        /* PRO PLAYER */
        .section-title { font-size: 14px; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .pro-card { background: linear-gradient(145deg, #111, #050505); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .pro-name { font-weight: 800; color: var(--blue); font-size: 15px; display: block; margin-bottom: 5px; }
        .pro-stats { font-size: 12px; color: #aaa; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        .credits { text-align: center; margin-top: 30px; font-size: 12px; color: var(--gray); font-weight: bold; }
    </style>
</head>
<body>

<div id="rain-container"></div>

<div class="app-container">
    <h2>SENS <span style="color:var(--blue)">TRØPEX</span></h2>

    <div class="box">
        <span class="label">Marca</span>
        <select id="brand" onchange="updateModels()">
            <option value="apple">Apple (iPhone)</option>
            <option value="samsung">Samsung</option>
            <option value="xiaomi">Xiaomi / Poco / Redmi</option>
            <option value="motorola">Motorola</option>
            <option value="realme">Realme</option>
            <option value="infinix">Infinix</option>
            <option value="honor">Honor</option>
            <option value="huawei">Huawei</option>
            <option value="tecno">Tecno</option>
            <option value="rog">Asus ROG / Gaming</option>
        </select>
        <span class="label" style="margin-top: 10px;">Modelo</span>
        <select id="model"></select>
    </div>
    
    <button class="btn-gerar" onclick="process()">🚀 GENERAR CONFIGURACIÓN</button>

    <div class="ai-box">
        <div id="ai-chat"><b>TRØPEX IA:</b> Iniciando protocolos de Withex ⁴⁴⁴. Sube la mira y dale a la cabeza.</div>
        <div class="ai-input-row">
            <input type="text" id="ai-input" placeholder="Pregúntame algo...">
            <button class="ai-send" onclick="talkToAI()">></button>
        </div>
    </div>

    <div class="section-title">🏆 PRO PLAYERS APARTADO</div>
    <div id="pro-list">
        <div class="pro-card">
            <span class="pro-name">WHITEFF ⁴⁴⁴</span>
            <div class="pro-stats"><span>Geral: 100</span> <span>Botão: 42%</span> <span>DPI: NATIVO</span> <span>Mira 2x: 100</span></div>
        </div>
        <div class="pro-card">
            <span class="pro-name">NOBRU TV</span>
            <div class="pro-stats"><span>Geral: 91</span> <span>Botão: 45%</span> <span>DPI: 720</span> <span>Mira 2x: 94</span></div>
        </div>
    </div>

    <div class="credits">Desarrollado por Withex ⁴⁴⁴</div>
</div>

<script>
    const db = {
        apple: ["iPhone 16 Pro Max", "iPhone 16 Pro", "iPhone 15 Pro Max", "iPhone 15", "iPhone 14 Pro Max", "iPhone 14", "iPhone 13 Pro Max", "iPhone 13 Mini", "iPhone 12 Pro Max", "iPhone 12", "iPhone 11 Pro Max", "iPhone 11", "iPhone XS Max", "iPhone XR", "iPhone X", "iPhone 8 Plus", "iPhone 7 Plus", "iPhone 6s"],
        samsung: ["Galaxy S24 Ultra", "Galaxy S23 Ultra", "Galaxy S22 Ultra", "Galaxy S21 FE", "Galaxy S20 FE", "Galaxy A54 5G", "Galaxy A34", "Galaxy A24", "Galaxy A15", "Galaxy A14", "Galaxy A10s", "Galaxy Note 20 Ultra", "Galaxy J7 Prime"],
        xiaomi: ["Poco F6 Pro", "Poco F5", "Poco X6 Pro", "Poco X5 Pro", "Poco X3 Pro", "Redmi Note 13 Pro+", "Redmi Note 12", "Redmi Note 11", "Xiaomi 14 Ultra", "Xiaomi 13T Pro", "Redmi 12C"],
        motorola: ["Edge 50 Ultra", "Edge 40 Neo", "Moto G84", "Moto G54", "Moto G24 Power", "Moto G200", "Moto E13", "Moto G Stylus"],
        realme: ["Realme GT 5", "Realme 12 Pro+", "Realme 11 Pro", "Realme C67", "Realme C55", "Realme 9i"],
        infinix: ["Infinix Note 40 Pro", "Infinix Hot 40 Pro", "Infinix Zero 30", "Infinix Smart 8"],
        honor: ["Honor Magic 6 Pro", "Honor 90", "Honor 70", "Honor X8b", "Honor X7b"],
        huawei: ["P60 Pro", "Mate 50 Pro", "Nova 11i", "P40 Lite", "Y9 Prime"],
        tecno: ["Tecno Pova 6 Pro", "Tecno Camon 30", "Tecno Spark 20 Pro", "Tecno Phantom X2"],
        rog: ["ROG Phone 8 Pro", "ROG Phone 7 Ultimate", "ROG Phone 6", "RedMagic 9 Pro", "Black Shark 5 Pro"]
    };

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES'; m.rate = 1.1;
        window.speechSynthesis.speak(m);
    }

    const responses = [
        "He optimizado tu tasa de refresco.",
        "Ajustando sensibilidad para disparos a larga distancia.",
        "Withex ⁴⁴⁴ dice que la paciencia es clave para el rojo.",
        "Tu dispositivo es perfecto para esta configuración.",
        "Si la mira se queda en el pecho, sube la sensibilidad general.",
        "Limpiando caché de respuesta táctil..."
    ];

    function talkToAI() {
        let input = document.getElementById('ai-input').value.trim();
        let chat = document.getElementById('ai-chat');
        if(!input) return;
        let randomRes = responses[Math.floor(Math.random() * responses.length)];
        let final = randomRes + " Sube la mira y dale a la cabeza.";
        chat.innerHTML = `<b>TÚ:</b> ${input}<br><b>AI:</b> ${final}`;
        chat.scrollTop = chat.scrollHeight;
        speak(final);
        document.getElementById('ai-input').value = "";
    }

    window.onload = () => {
        const c = document.getElementById('rain-container');
        for(let i=0; i<60; i++) {
            const d = document.createElement('div');
            d.classList.add('drop');
            d.style.left = Math.random()*100+'vw';
            d.style.animationDuration = Math.random()*1+0.5+'s';
            d.style.animationDelay = Math.random()*2+'s';
            c.appendChild(d);
        }
        updateModels();
        setTimeout(() => speak("SENS TRØPEX iniciado. Sube la mira y dale a la cabeza."), 1000);
    };

    function updateModels() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = "";
        db[b].forEach(m => { s.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    function process() {
        speak("Configuración de Withex generada. Sube la mira y dale a la cabeza.");
        alert("¡Configuración cargada en el sistema!");
    }
</script>
</body>
</html>
