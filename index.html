<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENS TROPEX - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050000;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; filter: brightness(0.3); object-fit: cover;
        }
        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 90vh; text-align: center; padding: 20px;
        }
        h1 { font-size: 2.5rem; color: #ff0000; text-shadow: 0 0 15px #ff0000; margin-bottom: 5px; }
        p { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 30px; color: #aaa; }
        
        .selector { display: flex; gap: 20px; margin-bottom: 30px; }
        .option {
            padding: 15px; border: 2px solid #333; border-radius: 15px;
            cursor: pointer; transition: 0.3s; grayscale: 100%; opacity: 0.5;
        }
        .option img { width: 50px; }
        .option.active { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; grayscale: 0%; opacity: 1; transform: scale(1.1); }

        input {
            background: rgba(20,20,20,0.8); border: 1px solid #ff0000;
            padding: 15px; border-radius: 10px; color: white; width: 80%;
            max-width: 300px; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px;
        }
        
        .btn-start {
            background: #ff0000; color: white; border: none; padding: 15px 40px;
            font-weight: 900; border-radius: 5px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        /* BARRA INFERIOR */
        .navbar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10,10,10,0.95); border-top: 2px solid #ff0000;
            display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .nav-item { text-align: center; color: #666; cursor: pointer; font-size: 0.6rem; }
        .nav-item.active { color: #ff0000; }
        .nav-item div { font-size: 1.4rem; margin-bottom: 3px; }
    </style>
</head>
<body>

    <img src="fondo.jpg" id="bg-video">

    <div class="container">
        <h1>SENS TROPEX</h1>
        <p>SENSITIVITY ENGINE</p>

        <div class="selector">
            <div class="option" id="opt-android" onclick="selectType('ANDROID')">
                <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png" alt="Android">
            </div>
            <div class="option" id="opt-ios" onclick="selectType('IOS')">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="iOS">
            </div>
        </div>

        <input type="text" id="model" placeholder="MODELO DEL MÓVIL">
        <button class="btn-start" onclick="start()">CONTINUAR</button>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="location.href='index.html'">
            <div>🏠</div>INICIO
        </div>
        <div class="nav-item" onclick="location.href='chat.html'">
            <div>🤖</div>IA CHAT
        </div>
        <div class="nav-item" onclick="location.href='pros.html'">
            <div>🏆</div>PROS
        </div>
        <div class="nav-item" onclick="alert('Próximamente...')">
            <div>👤</div>PERFIL
        </div>
    </div>

    <script>
        let selected = "";

        function selectType(type) {
            selected = type;
            document.getElementById('opt-android').classList.remove('active');
            document.getElementById('opt-ios').classList.remove('active');
            if(type === 'ANDROID') document.getElementById('opt-android').classList.add('active');
            else document.getElementById('opt-ios').classList.add('active');
        }

        function start() {
            const m = document.getElementById('model').value;
            if(!selected || !m) {
                alert("Por favor selecciona tu sistema e ingresa el modelo.");
                return;
            }
            localStorage.setItem('celular', selected + " " + m);
            window.location.href = "generar.html";
        }
    </script>
</body>
</html>
