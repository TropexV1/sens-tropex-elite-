<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA - Sens Tropex Elite</title>
    <style>
        :root { --red: #ff3c3c; --bg: #050505; --card: #121212; --blue: #00d4ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, rgba(255,60,60,0.1), transparent); }
        .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; margin: 0 auto; }
        .platform-card { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .platform-card.active { border-color: var(--red); box-shadow: 0 0 15px rgba(255,60,60,0.2); }
        .input-box { width: 90%; max-width: 400px; margin: 20px auto; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-continue { width: 90%; max-width: 400px; background: var(--red); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; }
        .loader-bar { width: 90%; max-width: 400px; background: #222; height: 6px; border-radius: 3px; overflow: hidden; display: none; margin: 20px auto; }
        .fill { width: 0%; height: 100%; background: var(--red); transition: 2s linear; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div class="header"><h1>TROPEX<span style="color:var(--red)"> ELITE</span></h1><p>SENSITIVITY ENGINE</p></div>
    <div class="platform-grid">
        <div class="platform-card" id="card-android" onclick="selectType('android')">🤖<span> ANDROID</span></div>
        <div class="platform-card" id="card-ios" onclick="selectType('ios')">🍎<span> IOS</span></div>
    </div>
    <div class="input-box"><input type="text" id="device-input" placeholder="Ej: Galaxy S23, iPhone 15..."></div>
    <button class="btn-continue" onclick="generar()">CONTINUAR ❯</button>
    <div class="loader-bar" id="loader"><div class="fill" id="fill"></div></div>
    <div id="result-box" style="padding: 20px; text-align: center;"></div>
    <nav class="bottom-nav">
        </nav>
    <script>
        let selectedType = '';
        function selectType(t) {
            selectedType = t;
            document.querySelectorAll('.platform-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + t).classList.add('active');
        }
        function generar() {
            const val = document.getElementById('device-input').value.toLowerCase().trim();
            const res = document.getElementById('result-box');
            const marcas = ["iphone", "samsung", "xiaomi", "redmi", "poco", "motorola", "apple"];
            const existe = marcas.some(m => val.includes(m));
            if (!selectedType || val === "") return;
            if (!existe) { res.innerHTML = `<p style="color:var(--red)">❌ Error dispositivo no existente</p>`; return; }
            document.getElementById('loader').style.display = "block";
            setTimeout(() => document.getElementById('fill').style.width = "100%", 50);
            setTimeout(() => {
                document.getElementById('loader').style.display = "none";
                if (selectedType === 'ios' || val.includes('iphone')) {
                    res.innerHTML = `<div class="platform-card"><b>${val.toUpperCase()}</b><br>• General: 100%<br>🚫 iPhone no tiene DPI.</div>`;
                } else {
                    res.innerHTML = `<div class="platform-card"><b>${val.toUpperCase()}</b><br>• General: 95%<br>• DPI: 580</div>`;
                }
            }, 2100);
        }
    </script>
</body>
</html>
