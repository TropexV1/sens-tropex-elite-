<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA - Tropex Elite</title>
    <style>
        :root { --red: #ff3c3c; --bg: #050505; --card: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; padding-bottom: 90px; }
        .header { padding: 30px; text-align: center; background: linear-gradient(to bottom, rgba(255,60,60,0.1), transparent); }
        .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .platform-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .platform-card.active { border-color: var(--red); box-shadow: 0 0 15px rgba(255,60,60,0.2); }
        .input-box { padding: 0 20px; margin-bottom: 20px; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-gen { width: calc(100% - 40px); margin: 0 20px; background: var(--red); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .loader { width: calc(100% - 40px); margin: 20px; background: #222; height: 6px; border-radius: 3px; display: none; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--red); transition: 2s linear; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-link { text-decoration: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 9px; }
        .nav-link.active { color: white; }
    </style>
</head>
<body>
    <div class="header"><h1>TROPEX<span style="color:var(--red)"> IA</span></h1><p>SENSITIVITY ENGINE</p></div>
    <div class="platform-grid">
        <div class="platform-card" id="c-and" onclick="sel('and')">🤖<br>ANDROID</div>
        <div class="platform-card" id="c-ios" onclick="sel('ios')">🍎<br>IOS</div>
    </div>
    <div class="input-box"><input type="text" id="dev" placeholder="Modelo del dispositivo..."></div>
    <button class="btn-gen" onclick="gen()">GENERAR DATA ❯</button>
    <div class="loader" id="l"><div class="fill" id="f"></div></div>
    <div id="res" style="padding:20px; text-align:center"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><span>🏠</span><span>Inicio</span></a>
        <a href="ia.html" class="nav-link active"><span>📟</span><span>IA</span></a>
        <a href="chat.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="perfil.html" class="nav-link"><span>👤</span><span>Perfil</span></a>
        <a href="config.html" class="nav-link"><span>⚙️</span><span>Config</span></a>
        <a href="info.html" class="nav-link"><span>📄</span><span>Info</span></a>
        <a href="pros.html" class="nav-link"><span>👥</span><span>Pros</span></a>
    </nav>

    <script>
        let s = '';
        function sel(t){ s=t; document.querySelectorAll('.platform-card').forEach(c=>c.classList.remove('active')); document.getElementById('c-'+t).classList.add('active'); }
        function gen(){
            const v = document.getElementById('dev').value.toLowerCase().trim();
            const r = document.getElementById('res');
            const marcas = ["iphone","samsung","xiaomi","redmi","poco","motorola","apple","huawei"];
            if(!s || !v) return;
            if(!marcas.some(m=>v.includes(m))){ r.innerHTML="<p style='color:var(--red)'>❌ Error dispositivo no existente</p>"; return; }
            document.getElementById('l').style.display="block";
            setTimeout(()=>document.getElementById('f').style.width="100%",50);
            setTimeout(()=>{
                document.getElementById('l').style.display="none";
                if(s==='ios'||v.includes('iphone')){ r.innerHTML="<b>DATA IOS</b><br>Gen: 100 | Rojo: 98<br>🚫 iPhone no tiene DPI"; }
                else { r.innerHTML=`<b>DATA ANDROID</b><br>Gen: 96 | Rojo: 92<br>⚙️ DPI: ${Math.floor(Math.random()*200)+400}`; }
            },2100);
        }
    </script>
</body>
</html>
