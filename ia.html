<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropex AI - Strict Engine</title>
    <style>
        :root {
            --red-accent: #ff3c3c;
            --dark-bg: #050505;
            --card-bg: #121212;
            --neon-blue: #00d4ff;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: white;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 160px; /* Espacio para input + nav */
        }

        .bot-msg {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--neon-blue);
            max-width: 85%;
            font-size: 14px;
        }

        .user-msg {
            align-self: flex-end;
            background: #333;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 70%;
        }

        /* AREA DE ESCRITURA */
        .input-area {
            position: fixed;
            bottom: 75px; /* Justo encima de la nav bar */
            left: 0; right: 0;
            padding: 15px;
            background: #000;
            display: flex;
            gap: 10px;
            z-index: 1001;
        }

        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--red-accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* BARRA DE NAVEGACIÓN (LOS 7 ICONOS) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 1000;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px;
        }

        .nav-link.active { color: white; }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }

    </style>
</head>
<body>

    <div id="chat-box">
        <div class="bot-msg">🤖 Hola. Soy la IA de Tropex. Dime tu dispositivo para calcular tu sensibilidad.</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ej: iPhone 13 o Samsung S23...">
        <button onclick="enviarMensaje()">ENVIAR</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><div class="nav-icon">🏠</div><span>Inicio</span></a>
        <a href="ia.html" class="nav-link active"><div class="nav-icon">📟</div><span>IA</span></a>
        <a href="chat.html" class="nav-link"><div class="nav-icon">💬</div><span>Chat</span></a>
        <a href="perfil.html" class="nav-link"><div class="nav-icon">👤</div><span>Perfil</span></a>
        <a href="config.html" class="nav-link"><div class="nav-icon">⚙️</div><span>Config</span></a>
        <a href="info.html" class="nav-link"><div class="nav-icon">📄</div><span>Info</span></a>
        <a href="pros.html" class="nav-link"><div class="nav-icon">👥</div><span>Withex ⁴⁴⁴</span></a>
    </nav>

    <script>
        // LISTA DE DISPOSITIVOS REALES (AÑADE MÁS AQUÍ)
        const baseDatos = {
            "iphone": ["11", "12", "13", "14", "15", "x", "xr", "8", "7", "pro", "max"],
            "samsung": ["s23", "s22", "s21", "a54", "a34", "a14", "s20", "a52", "a71"],
            "xiaomi": ["redmi", "poco", "note", "12", "13", "f5", "x5"],
            "motorola": ["edge", "g84", "g54", "moto"]
        };

        function enviarMensaje() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = inputField.value.trim().toLowerCase();

            if (userText === "") return;

            chatBox.innerHTML += `<div class="user-msg">${userText}</div>`;
            inputField.value = "";

            setTimeout(() => {
                // 1. Validar si la marca y el modelo existen en nuestra base
                let marcaEncontrada = "";
                for (let marca in baseDatos) {
                    if (userText.includes(marca)) {
                        marcaEncontrada = marca;
                        break;
                    }
                }

                // Verificar si el modelo específico también parece real
                const modeloExiste = marcaEncontrada && baseDatos[marcaEncontrada].some(m => userText.includes(m));

                if (!marcaEncontrada || !modeloExiste) {
                    chatBox.innerHTML += `<div class="bot-msg" style="color: var(--red-accent); border-left-color: var(--red-accent);">❌ Error dispositivo no existente</div>`;
                } 
                // 2. Si es iPhone/Apple (SIN DPI)
                else if (marcaEncontrada === "iphone" || userText.includes("apple")) {
                    chatBox.innerHTML += `
                        <div class="bot-msg">
                            🤖 <b>CONFIGURACIÓN IPHONE</b><br><br>
                            • General: 100%<br>
                            • Punto Rojo: 97%<br>
                            • Mira 2x: 100%<br>
                            • Mira 4x: 100%<br>
                            🚫 <b>DPI: No compatible con iOS</b>
                        </div>`;
                } 
                // 3. Android (CON DPI)
                else {
                    chatBox.innerHTML += `
                        <div class="bot-msg">
                            🤖 <b>CONFIGURACIÓN ANDROID</b><br><br>
                            • General: 95%<br>
                            • Punto Rojo: 90%<br>
                            • Mira 2x: 85%<br>
                            • <b>DPI: 560</b><br>
                            • Botón: 44%
                        </div>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
