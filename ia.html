<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TROPEX - AI CPU</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Icono CPU Central */
        .cpu-container { position: relative; z-index: 10; text-align: center; }
        #cpu-main { width: 150px; filter: drop-shadow(0 0 20px #ff0000); transition: 0.3s; }
        
        .status-box { background: rgba(255,0,0,0.1); border: 1px solid #ff0000; padding: 20px; border-radius: 15px; margin-top: 20px; width: 80%; max-width: 300px; text-align: center; }
        .pulse { animation: pulse-red 2s infinite; color: #ff0000; font-size: 12px; margin-top: 10px; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Navbar (Copia la de tu index) */
        .navbar { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 5px; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 8px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; filter: grayscale(1); }
        .nav-item.active .nav-icon { filter: grayscale(0); }
    </style>
</head>
<body>
    <div class="cpu-container">
        <img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" id="cpu-main" alt="CPU IA">
        <div class="status-box">
            <p style="font-size: 14px;">NÚCLEO ACTIVO</p>
            <p class="pulse">ANALIZANDO HARDWARE...</p>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" class="nav-icon">Inicio</a>
        <a href="ia.html" class="nav-item active"><img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" class="nav-icon">IA</a>
        <a href="chat.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/5948/5948565.png" class="nav-icon">Chat</a>
        <a href="perfil.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="nav-icon">Perfil</a>
        <a href="config.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" class="nav-icon">Config</a>
        <a href="info.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/471/471663.png" class="nav-icon">Info</a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelector("#cpu-main"), { max: 25, speed: 400, gyroscope: true });
    </script>
</body>
</html>
