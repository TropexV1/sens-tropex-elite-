<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Sens Tropex Elite</title>
    <style>
        :root { --red-accent: #ff3c3c; --dark-bg: #050505; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .profile-container { padding: 20px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--red-accent); box-shadow: 0 0 20px rgba(255, 60, 60, 0.4); margin-bottom: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; width: 80%; text-align: center; font-size: 18px; outline: none; border: 1px solid var(--red-accent); }
        .rank-box { margin-top: 30px; background: #121212; padding: 20px; border-radius: 15px; display: inline-block; width: 80%; border: 1px solid #222; }
        .rank-title { color: var(--red-accent); font-weight: bold; font-size: 22px; text-transform: uppercase; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-link { text-decoration: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-link.active { color: white; }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" class="avatar">
        <br>
        <input type="text" id="userName" placeholder="Escribe tu Nombre Gamer" oninput="saveName(this.value)">
        
        <div class="rank-box">
            <div class="rank-title">Rango: HEROICO 🏆</div>
            <p style="color: #888; font-size: 14px;">Usuario verificado por Tropex Elite</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <div style="display:flex; justify-content: space-around;">
                <div><b>14</b><br><small style="color:#888">Sensis</small></div>
                <div><b>99%</b><br><small style="color:#888">Headshot</small></div>
                <div><b>PRO</b><br><small style="color:#888">Nivel</small></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><span>🏠</span><span>Inicio</span></a>
        <a href="ia.html" class="nav-link"><span>📟</span><span>IA</span></a>
        <a href="chat.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="perfil.html" class="nav-link active"><span>👤</span><span>Perfil</span></a>
        <a href="config.html" class="nav-link"><span>⚙️</span><span>Config</span></a>
        <a href="info.html" class="nav-link"><span>📄</span><span>Info</span></a>
        <a href="pros.html" class="nav-link"><span>👥</span><span>Withex ⁴⁴⁴</span></a>
    </nav>

    <script>
        const audio = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
        
        // Cargar nombre guardado
        document.getElementById('userName').value = localStorage.getItem('nombreTropex') || "";

        function saveName(val) {
            localStorage.setItem('nombreTropex', val);
        }

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => audio.play());
        });
    </script>
</body>
</html>
