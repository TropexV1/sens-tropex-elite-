<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA CYBER - TROPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020000; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        /* Fondo decorado con niebla */
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,0,0,0.15) 0%, transparent 70%); z-index: -2; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1; margin-bottom: 80px; }
        .msg { padding: 12px 18px; border-radius: 5px 20px 20px 20px; max-width: 85%; font-size: 12px; border: 1px solid rgba(255,0,0,0.5); backdrop-filter: blur(5px); }
        .ai { background: rgba(40, 0, 0, 0.6); align-self: flex-start; color: #fff; border-left: 4px solid #ff0000; }
        .user { background: #ff0000; align-self: flex-end; color: white; border-radius: 20px 5px 20px 20px; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        
        #input-area { position: fixed; bottom: 70px; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ff0000; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; outline: none; font-family: 'Orbitron'; font-size: 12px; }
        input:focus { border-color: #ff0000; }
        
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #ff0000; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="bloodRain"></canvas>
    <div style="padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #ff0000; text-align: center; font-weight: bold; color: #ff0000; letter-spacing: 3px;">🛰️ TROPEX CYBER-LINK</div>
    
    <div id="chat-container">
        <div class="msg ai">Sincronización completa. Soy la unidad táctica TROPEX. ¿Qué arma quieres dominar hoy? 💉</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Comando de voz/texto...">
        <button style="background:#ff0000; border:none; color:white; padding:0 15px; border-radius:5px;" onclick="sendMessage()">➤</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item">🏠<br>INICIO</a>
        <a href="chat.html" class="nav-item active">🤖<br>IA CHAT</a>
        <a href="pros.html" class="nav-item">🏆<br>PROS</a>
        <a href="config.html" class="nav-item">⚙️<br>AJUSTES</a>
    </nav>

    <script>
        // Lluvia de sangre mejorada
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for(let i=0; i<100; i++) drops.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, l: Math.random()*25, v: Math.random()*6+4});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(200, 0, 0, 0.7)'; ctx.lineWidth = 1;
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                d.y += d.v; if(d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if(!input.value) return;
            container.innerHTML += `<div class="msg user">${input.value}</div>`;
            input.value = "";
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
