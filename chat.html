<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat - SENS TROPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050000; color: white; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .ai { background: #220000; border: 1px solid #ff0000; align-self: flex-start; color: #ffcccc; }
        .user { background: #ff0000; align-self: flex-end; color: white; }
        #input-area { background: #111; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ff0000; margin-bottom: 60px; }
        input { flex: 1; background: #000; border: 1px solid #ff0000; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #ff0000; border: none; color: white; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div style="padding: 15px; background: #000; border-bottom: 1px solid #ff0000; text-align: center; font-weight: bold; color: #ff0000;">🤖 IA TROPEX ASSISTANT</div>
    
    <div id="chat-container">
        <div class="msg ai">¡Hola! Soy la IA de SENS TROPEX. Pregúntame sobre sensibilidades o DPI para pegar todo rojo. 🔴</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu duda aquí...">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if(!input.value) return;

            // Mensaje del usuario
            container.innerHTML += `<div class="msg user">${input.value}</div>`;
            
            const text = input.value.toLowerCase();
            input.value = "";
            
            // Lógica de respuesta de la IA
            setTimeout(() => {
                let reply = "No entiendo esa duda, pero te recomiendo usar el generador de SENS TROPEX para tu modelo exacto.";
                if(text.includes("iphone")) reply = "Para iPhone te recomiendo un DPI de 120 (Móvil) y sensibilidad general al 98%.";
                if(text.includes("android")) reply = "En Android, activa el supresor al 60% y usa un botón de disparo de 42%.";
                if(text.includes("rojo")) reply = "Para pegar rojo, levanta el botón de disparo en forma de 'J'.";
                
                container.innerHTML += `<div class="msg ai">${reply}</div>`;
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
