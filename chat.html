<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat - SENS TROPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050000; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 13px; line-height: 1.4; border: 1px solid rgba(255,0,0,0.3); }
        .ai { background: rgba(30, 0, 0, 0.8); align-self: flex-start; color: #ffcccc; }
        .user { background: #ff0000; align-self: flex-end; color: white; box-shadow: 0 0 10px #ff0000; }
        #input-area { background: rgba(10,10,10,0.9); padding: 15px; display: flex; gap: 10px; border-top: 2px solid #ff0000; margin-bottom: 70px; }
        input { flex: 1; background: #000; border: 1px solid #ff0000; color: white; padding: 10px; border-radius: 5px; outline: none; font-family: 'Orbitron'; }
        button { background: #ff0000; border: none; color: white; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #ff0000; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="bloodRain"></canvas>
    <div style="padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #ff0000; text-align: center; font-weight: bold; color: #ff0000; letter-spacing: 2px;">🤖 TROPEX AI ASSISTANT</div>
    <div id="chat-container">
        <div class="msg ai">Bienvenido a la Élite. Soy la IA de TROPEX. Pregúntame por armas (M1014, Desert), DPI o cómo pegar rojo. 🩸</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu duda...">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>
    <nav class="navbar">
        <a href="index.html" class="nav-item">🏠<br>INICIO</a>
        <a href="chat.html" class="nav-item active">🤖<br>IA CHAT</a>
        <a href="pros.html" class="nav-item">🏆<br>PROS</a>
        <a href="config.html" class="nav-item">⚙️<br>AJUSTES</a>
    </nav>

    <script>
        // --- LLUVIA DE SANGRE ---
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for(let i=0; i<100; i++) drops.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, l: Math.random()*20, v: Math.random()*5+5});
        function drawRain() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(180, 0, 0, 0.6)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                d.y += d.v; if(d.y > canvas.height) { d.y = -20; d.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(drawRain);
        }
        drawRain();

        // --- LÓGICA IA ---
        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if(!input.value) return;
            container.innerHTML += `<div class="msg user">${input.value}</div>`;
            const text = input.value.toLowerCase(); input.value = "";
            setTimeout(() => {
                let r = "Interesante... para esa duda te recomiendo mi configuración VIP.";
                if(text.includes("m1014")) r = "Para la M1014: Botón al 54% y levanta la mira en 'J' rápido.";
                if(text.includes("desert")) r = "Con la Desert: Mira al pecho y levanta suave. Botón 42%.";
                if(text.includes("rojo")) r = "El secreto del rojo está en el DPI. ¿Ya configuraste tu móvil en la sección AJUSTES?";
                if(text.includes("hola")) r = "Saludos, Guerrero Tropex. ¿Listo para dominar?";
                container.innerHTML += `<div class="msg ai">${r}</div>`;
                container.scrollTop = container.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
