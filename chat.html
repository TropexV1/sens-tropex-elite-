<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRØPEX - AI CHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-image: radial-gradient(circle at center, #1a0000 0%, #000 70%); }
        
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 140px; position: relative; z-index: 5; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 11px; line-height: 1.5; }
        .ai { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff0000; align-self: flex-start; color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .user { background: #1a1a1a; border: 1px solid #333; align-self: flex-end; color: #fff; }

        .input-area { position: fixed; bottom: 90px; left: 5%; width: 90%; display: flex; gap: 8px; z-index: 9999; background: black; padding: 5px; border-radius: 12px; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #444; padding: 14px; border-radius: 10px; color: white; font-family: 'Orbitron'; outline: none; font-size: 12px; }
        input:focus { border-color: #ff0000; }
        button { background: #ff0000; border: none; width: 50px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }

        .navbar { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 5px; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 8px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; height: 20px; filter: grayscale(1); opacity: 0.6; }
        .nav-item.active .nav-icon { filter: grayscale(0) brightness(1.5); opacity: 1; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="msg ai">SISTEMA TRØPEX V3 ONLINE. ¿En qué puedo ayudarte con tu sensibilidad?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu duda...">
        <button onclick="sendMessage()">></button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" class="nav-icon">Inicio</a>
        <a href="chat.html" class="nav-item active"><img src="https://cdn-icons-png.flaticon.com/512/900/900618.png" class="nav-icon">IA</a>
        <a href="pros.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/5948/5948565.png" class="nav-icon">Pros</a>
        <a href="config.html" class="nav-item"><img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" class="nav-icon">Config</a>
    </nav>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            if(!input.value.trim()) return;

            container.innerHTML += `<div class="msg user">${input.value}</div>`;
            const val = input.value.toLowerCase();
            input.value = "";

            setTimeout(() => {
                let response = "Analizando datos... Sugiero subir el DPI en un 10% para mejorar el tracking.";
                if(val.includes("sensi")) response = "Para tu dispositivo, la sensibilidad ideal en General es 98%.";
                container.innerHTML += `<div class="msg ai">${response}</div>`;
                container.scrollTop = container.scrollHeight;
            }, 800);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
