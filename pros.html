    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; padding: 20px; background-image: radial-gradient(circle at center, #1a0000 0%, #000 70%); }
        h2 { color: #ff0000; text-align: center; margin-bottom: 30px; margin-top: 20px; font-size: 1.5rem; }
        
        .pro-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }

        .pro-info h3 { font-size: 14px; color: #fff; }
        .pro-info p { font-size: 10px; color: #ff0000; }

        .navbar { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 5px; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 8px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; height: 20px; filter: grayscale(1); opacity: 0.6; }
        .nav-item.active .nav-icon { filter: grayscale(0) brightness(1.5); opacity: 1; }
    </style>
</head>
