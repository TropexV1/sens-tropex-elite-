<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pros - SENS TROPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050000; color: white; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .pro-card { background: rgba(20, 0, 0, 0.8); border: 1px solid #ff0000; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; z-index: 10; position: relative; }
        .pro-photo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff0000; }
        .pro-name { font-weight: bold; color: #ff0000; }
        .stats { font-size: 11px; color: #ccc; margin-top: 5px; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #ff0000; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="bloodRain"></canvas>
    <h1 style="text-align: center; color: #ff0000; text-shadow: 0 0 10px #ff0000;">ELITE PLAYERS</h1>
    
    <div class="pro-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A7L-Y3p2R8N9Y9R8N9Y9R8N9Y9R8N9Y9RA&usqp=CAU" class="pro-photo">
        <div><div class="pro-name">DONATO 🇻🇪</div><div class="stats">Botón: 38% | DPI: 500</div></div>
    </div>
    
    <div class="pro-card">
        <img src="https://cdn-icons-png.flaticon.com/512/10892/10892514.png" class="pro-photo">
        <div><div class="pro-name">AKILES (Incógnito)</div><div class="stats">Botón: 40% | DPI: 800</div></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item">🏠<br>INICIO</a>
        <a href="chat.html" class="nav-item">🤖<br>IA CHAT</a>
        <a href="pros.html" class="nav-item active">🏆<br>PROS</a>
        <a href="config.html" class="nav-item">⚙️<br>AJUSTES</a>
    </nav>

    <script>
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for(let i=0; i<80; i++) drops.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, l: Math.random()*25, v: Math.random()*4+4});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(150, 0, 0, 0.5)'; ctx.lineWidth = 1.5;
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                d.y += d.v; if(d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
