<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pros - Tropex Elite</title>
    <style>
        :root { --red: #ff3c3c; --bg: #050505; --card: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; padding-bottom: 90px; }
        .search-container { padding: 20px; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; box-sizing: border-box; }
        .p-card { background: var(--card); border-radius: 15px; padding: 20px; margin: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .item { background: #000; padding: 8px; border-radius: 8px; text-align: center; font-size: 12px; border: 1px solid #1a1a1a; }
        .item span { display: block; font-size: 8px; color: #888; text-transform: uppercase; }
        .btn-copy { width: 100%; background: #252525; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-link { text-decoration: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 9px; }
    </style>
</head>
<body>
    <div class="search-container"><input type="text" id="s" placeholder="🔍 Buscar influencer..."></div>
    <div id="list">
        <div class="p-card">
            <h3>Apelapato 🇧🇷</h3>
            <div class="grid">
                <div class="item"><span>Gen</span><b>189</b></div>
                <div class="item"><span>Rojo</span><b>193</b></div>
                <div class="item"><span>2x</span><b>167</b></div>
                <div class="item"><span>4x</span><b>173</b></div>
                <div class="item"><span>DPI</span><b>450</b></div>
                <div class="item"><span>Botón</span><b>45%</b></div>
            </div>
            <button class="btn-copy" onclick="cp('Apelapato')">Copiar Sensibilidad</button>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><span>🏠</span><span>Inicio</span></a>
        <a href="ia.html" class="nav-link"><span>📟</span><span>IA</span></a>
        <a href="chat.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="perfil.html" class="nav-link"><span>👤</span><span>Perfil</span></a>
        <a href="config.html" class="nav-link"><span>⚙️</span><span>Config</span></a>
        <a href="info.html" class="nav-link"><span>📄</span><span>Info</span></a>
        <a href="pros.html" class="nav-link" style="color:white"><span>👥</span><span>Pros</span></a>
    </nav>
    <script>
        function cp(n){ alert("✅ Sensibilidad de "+n+" copiada al portapapeles"); }
        document.getElementById('s').addEventListener('input', (e)=>{
            let v = e.target.value.toLowerCase();
            document.querySelectorAll('.p-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none");
        });
    </script>
</body>
</html>
