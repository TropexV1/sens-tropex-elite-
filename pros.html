<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pros - SENS TROPEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050000; color: white; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; margin-bottom: 80px; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .pro-card { background: rgba(15, 0, 0, 0.85); border-left: 5px solid #ff0000; border-radius: 5px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        .pro-img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #ff0000; background: #222; }
        .pro-info b { color: #ff0000; display: block; font-size: 14px; }
        .pro-info span { font-size: 10px; color: #888; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #ff0000; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="bloodRain"></canvas>
    <h1 style="text-align: center; color: #ff0000; font-size: 20px; text-shadow: 0 0 15px #ff0000;">THE IMMORTALS</h1>

    <div class="pro-card">
        <div class="pro-img"></div>
        <div class="pro-info"><b>BOYKA FF 🇧🇷</b><span>Sens: 100 | Botón: 44%</span></div>
    </div>
    <div class="pro-card">
        <div class="pro-img"></div>
        <div class="pro-info"><b>WHITE 444 🇹🇭</b><span>Sens: 96 | Botón: 39%</span></div>
    </div>
    <div class="pro-card">
        <div class="pro-img"></div>
        <div class="pro-info"><b>VINCENZO 🇮🇹</b><span>Sens: 88 | Botón: 51%</span></div>
    </div>
    <div class="pro-card">
        <div class="pro-img"></div>
        <div class="pro-info"><b>DONATO 🇻🇪</b><span>Sens: 95 | Botón: 38%</span></div>
    </div>
    <div class="pro-card">
        <div class="pro-img"></div>
        <div class="pro-info"><b>NARCO 🇨🇴</b><span>Sens: 91 | Botón: 45%</span></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item">🏠<br>INICIO</a>
        <a href="chat.html" class="nav-item">🤖<br>IA CHAT</a>
        <a href="pros.html" class="nav-item active">🏆<br>PROS</a>
        <a href="config.html" class="nav-item">⚙️<br>AJUSTES</a>
    </nav>

    <script>
        const canvas = document.getElementById('bloodRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = [];
        for(let i=0; i<80; i++) drops.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, l: Math.random()*25, v: Math.random()*5+4});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(150, 0, 0, 0.5)'; ctx.lineWidth = 1;
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                d.y += d.v; if(d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
